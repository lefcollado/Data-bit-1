<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Berlin Fire Map</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- WELCOME PAGE -->
  <div id="welcomeScreen">
    <div class="welcomeContent">
      <h1>Berlin Fire Response Explorer</h1>

      <p>
        This interactive map lets you explore fire brigade activity in Berlin.
        Start by selecting the Bezirksregion where you live, then zoom into your
        Planungsraum to see local response coverage.
      </p>

      <button id="startButton">↓ Start</button>
    </div>
  </div>

  <!-- MAP PAGE -->
  <div id="mapScreen">

    <div class="page">
      <h1>Find your area</h1>

      <p id="status">Step 1: Click your Bezirksregion.</p>

      <button id="resetBtn" hidden>Back to all Bezirksregionen</button>

      <div id="map"></div>
    </div>

  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>

</body>
</html>
